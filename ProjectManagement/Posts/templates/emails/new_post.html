<!DOCTYPE html>
<html>
<head>
</head>
<body style="font-family: 'DM Sans', sans-serif; color: #0a0a0a; line-height: 1.6; background: #f7f6f2; margin: 0; padding: 20px;">
    <div class="container" style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border: 1.5px solid #e0ddd6; border-radius: 4px;">
        <h2 style="font-family: 'Syne', sans-serif; font-weight: 700; color: #0a0a0a; margin-top: 0;">New Project Update</h2>

        <p><strong>Author:</strong> {{ author.username }}</p>
        <p><strong>Client:</strong> {{ client.name }}</p>
        <p><strong>Title:</strong> {{ post.title }}</p>

        <p><strong>Content:</strong></p>
        <p>{{ post.content }}</p>

        {% if file_urls %}
            <hr style="border: 0; border-top: 1px solid #e0ddd6; margin: 20px 0;">
            <h3 style="font-family: 'Syne', sans-serif; font-weight: 700; color: #0a0a0a;">Attachments</h3>
            <ul style="list-style: none; padding: 0;">
                {% for file in file_urls %}
                    <li style="margin-bottom: 10px;">
                        <a href="{{ file.url }}" target="_blank" style="color: #c9a800; text-decoration: none; font-weight: 600;">
                            {{ file.name }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        <br>

        <p>
            <a href="{{ post_url }}" target="_blank" style="background: #FFD700; color: #0a0a0a; padding: 10px 20px; border-radius: 4px; display: inline-block; text-decoration: none; font-weight: 600;">
                View Update
            </a>
        </p>
    </div>
</body>
</html>
