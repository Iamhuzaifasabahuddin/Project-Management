{% extends 'base.html' %}
{% load static %}
{% load bootstrap5 %}

{% block title %}All Teams - Hexz Connect{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-4">
            <div>
                <div class="eyebrow">Network Overview</div>
                <h1 class="section-title mb-0">All Teams<span>.</span></h1>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="{% url 'dashboard' %}" class="btn-black">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">
    <!-- SEARCH FORM -->
    <div class="row mb-4">
        <div class="col-md-6">
            <form method="GET" class="d-flex gap-2"
                  hx-get="{% url 'all_user_teams' %}"
                  hx-target="#team-list">
                <input type="text" name="search" class="form-control" value="{{ search_query }}" placeholder="Search teams...">
                <button type="submit" class="btn-black">Search</button>
                {% if search_query %}
                    <a href="{% url 'all_user_teams' %}" class="btn btn-outline-secondary">Clear</a>
                {% endif %}
            </form>
        </div>
    </div>
    <div id="teamGrid">
        {% include "includes/team_list_fragment.html" %}
    </div>
</div>

<style>
    .hover-gold:hover {
        color: var(--gold-dim) !important;
    }
    .text-gold { color: var(--gold-dim); }
</style>
{% endblock %}
