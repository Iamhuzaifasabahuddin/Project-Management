<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f5f6f8; padding:20px;">

    <div style="max-width:600px; margin:auto; background:#fff; padding:30px; border-radius:10px;">

        <h2 style="color:#333;">Reset your password</h2>

        <p>Hello,</p>

        <p>You requested a password reset. Click the button below:</p>

        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
           style="display:inline-block; padding:12px 20px; background:#0d6efd; color:#fff; text-decoration:none; border-radius:6px;">
            Reset Password
        </a>

        <p style="margin-top:20px; font-size:12px; color:#777;">
            If you did not request this, ignore this email.
        </p>

    </div>

</body>
</html>
