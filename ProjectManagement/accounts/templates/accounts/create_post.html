<!DOCTYPE html>
{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>

    <style>
        body {
            background: #f5f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .navbar-custom {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        .editor-card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
        }

        .muted {
            color: #6b7280;
        }

        .workspace-pill {
            display: inline-block;
            background: #eef2ff;
            color: #3730a3;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-custom px-4 py-3">
    <div class="container-fluid">

        <div>
            <h5 class="mb-0 fw-semibold">Create Post</h5>
            <small class="muted">Publish content in your workspace</small>
        </div>

        <div class="d-flex gap-2">

            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">
                Dashboard
            </a>

            <a href="{% url 'workspace_detail' workspace.id %}" class="btn btn-outline-secondary btn-sm">
                Workspace
            </a>

        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container py-5 d-flex justify-content-center">

    <div class="col-lg-6 col-md-8 col-sm-12">

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h3 class="fw-semibold mb-1">Create New Post</h3>
            <p class="muted mb-1">Publish content inside your workspace</p>

            <div class="workspace-pill">
                {{ workspace.name }}
            </div>
        </div>

        <!-- CARD -->
        <div class="card editor-card shadow-sm p-4 p-md-5">

            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}

                <!-- FORM -->
                {% bootstrap_form form %}

                <!-- SUBMIT -->
                <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold mt-3">
                    Publish Post
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
