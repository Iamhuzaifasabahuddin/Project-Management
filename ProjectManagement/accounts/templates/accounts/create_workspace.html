<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Workspace</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .workspace-form {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .form-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #4a90e2;
        }

        .errorlist {
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            border: none;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #357abd;
        }
    </style>
</head>

<body>

<form method="post" class="workspace-form">
    {% csrf_token %}

    <h2 class="form-title">Create Workspace</h2>

    <div class="form-group">
        {{ form.name.label_tag }}
        {{ form.name }}
        {{ form.name.errors }}
    </div>

    <div class="form-group">
        {{ form.parent.label_tag }}
        {{ form.parent }}
        {{ form.parent.errors }}
    </div>

    <button type="submit" class="btn-submit">
        Create Workspace
    </button>
</form>

</body>
</html>
