<!DOCTYPE html>
{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check your email</title>

    <style>
        body {
            background: #f5f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .auth-card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
        }

        .muted {
            color: #6b7280;
        }

        .btn-dark {
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="col-md-6 col-lg-5">

        <div class="card auth-card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">

                <h3 class="fw-semibold mb-2">Check your email</h3>

                <p class="muted small mb-0">
                    If an account exists with the email you entered, a password reset link has been sent.
                    Please check your inbox (and spam folder).
                </p>

                <a href="{% url 'login' %}" class="btn btn-dark w-100 py-2 fw-semibold mt-4">
                    Back to login
                </a>

            </div>
        </div>

    </div>
</div>

</body>
</html>
