<div class="row g-3 g-md-4">
    {% for w in workspaces %}
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{% url 'client_details' w.id %}" class="hexz-card h-100 d-flex flex-column">
            <div class="mb-4">
                <div class="eyebrow">Environment ID: {{ w.id|add:"0000" }}</div>
                <h3 class="h5 font-syne fw-bold mb-0">{{ w.name }}</h3>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-auto">
                <div class="muted d-flex align-items-center gap-2">
                    <i class="bi bi-layers"></i>
                    Open Workspace
                </div>
                <i class="bi bi-arrow-right text-gold" style="font-size: 1.2rem;"></i>
            </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12">
        <div class="text-center py-5 bg-white border rounded">
            <i class="bi bi-inbox text-muted display-4"></i>
            <h5 class="mt-3 font-syne fw-bold">No workspaces active</h5>
            <p class="muted">Initiate your first project environment to get started.</p>
            {% if is_admin or request.user.is_superuser %}
            <a href="{% url 'create_workspace' %}" class="btn-outline-custom mt-2">
                Initialize Workspace
            </a>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
