<div class="row g-4">
    {% for w in workspaces %}
    <div class="col-md-6 col-lg-4">
        <a href="{% url 'client_details' w.id %}" class="workspace-card">
            <div>
                <div class="eyebrow" style="font-size: 0.6rem; color: var(--gold-dim);">Environment ID: {{ w.id|add:"0000" }}</div>
                <h3>{{ w.name }}</h3>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-4">
                <div class="meta">
                    <i class="bi bi-layers"></i>
                    Open Workspace
                </div>
                <i class="bi bi-arrow-right text-gold" style="font-size: 1.2rem; color: var(--gold-dim);"></i>
            </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12">
        <div class="text-center py-5 bg-white border rounded">
            <i class="bi bi-inbox text-muted display-4"></i>
            <h5 class="mt-3 font-syne fw-bold" style="font-family: 'Syne', sans-serif;">No workspaces active</h5>
            <p class="text-muted">Initiate your first project environment to get started.</p>
            {% if is_admin or request.user.is_superuser %}
            <a href="{% url 'create_workspace' %}" class="btn-outline-custom text-decoration-none mt-2">
                Initialize Workspace
            </a>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
