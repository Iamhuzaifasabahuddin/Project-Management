<!DOCTYPE html>
{% load bootstrap5 %}
{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Project{% endblock %}</title>

    <!-- Bootstrap CSS -->
    {% bootstrap_css %}

    <!-- Select2 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2-bootstrap-5-theme/1.3.0/select2-bootstrap-5-theme.min.css"
          rel="stylesheet"/>

    <!--    <link rel="stylesheet" href="{% static 'style.css' %}">-->

    <style>
        body {
    background: #f5f6f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.navbar-custom {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
}
/* Select2 styling fixes */
.select2-container--bootstrap-5 .select2-selection {
    min-height: calc(1.5em + 0.75rem + 2px);
    padding: 0.375rem 0.75rem;
}

.select2-container--bootstrap-5.select2-container--focus .select2-selection {
    border-color: #80bdff;
    box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
}
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

{% block content %}{% endblock %}

<!-- Bootstrap JS -->
{% bootstrap_javascript %}

<!-- jQuery (REQUIRED for Select2 - must be before Select2 JS) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Select2 JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

<!-- Initialize Select2 for all fields -->
<script>
    $(document).ready(function() {
        // Initialize Select2 for all select fields with django-select2 class
        $('.django-select2').select2({
            theme: 'bootstrap-5',
            width: '100%',
            allowClear: true,
            closeOnSelect: false,  // For multi-select
        });
    });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
